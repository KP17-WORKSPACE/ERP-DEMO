    <style>
        .background-radial-gradient {
            background-color: hsl(218, 41%, 15%);
            background-image: radial-gradient(650px circle at 0% 0%, hsl(218, 41%, 35%) 15%, hsl(218, 41%, 30%) 35%,
                    hsl(218, 41%, 20%) 75%, hsl(218, 41%, 19%) 80%, transparent 100%),
                radial-gradient(1250px circle at 100% 100%, hsl(218, 41%, 45%) 15%, hsl(218, 41%, 30%) 35%, hsl(218, 41%, 20%) 75%,
                    hsl(218, 41%, 19%) 80%, transparent 100%);
        }

        #radius-shape-1 {
            height: 220px;
            width: 220px;
            top: -60px;
            left: -130px;
            background: radial-gradient(#44006b, #ad1fff);
            overflow: hidden;
        }

        #radius-shape-2 {
            border-radius: 38% 62% 63% 37% / 70% 33% 67% 30%;
            bottom: -60px;
            right: -110px;
            width: 300px;
            height: 300px;
            background: radial-gradient(#44006b, #ad1fff);
            overflow: hidden;
        }

        .bg-glass {
            background-color: hsla(0, 0%, 100%, 0.9) !important;
            backdrop-filter: saturate(200%) blur(25px);
        }

        .form-control {


            border: none;
            padding: 12px 20px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #0b6c36;
        }

        .btn-login {
            background-color: #0b6c36;
            color: white;
            border-radius: 20px;
            padding: 10px 20px;
            border: none;
        }

        .btn-login:hover {
            background-color: #0a5c30;
            color: white;
        }

        .signup-link {
            color: #0b6c36;
            text-decoration: none;
            font-weight: bold;
        }

        .background-radial-gradient {
    background-color: hsl(145, 41%, 15%);
    background-image: radial-gradient(650px circle at 0% 0%, hsl(145, 41%, 35%) 15%, hsl(145, 41%, 30%) 35%,
            hsl(145, 41%, 20%) 75%, hsl(145, 41%, 19%) 80%, transparent 100%),
        radial-gradient(1250px circle at 100% 100%, hsl(145, 41%, 45%) 15%, hsl(145, 41%, 30%) 35%, hsl(145, 41%, 20%) 75%,
            hsl(145, 41%, 19%) 80%, transparent 100%);
}

#radius-shape-1 {
    height: 220px;
    width: 220px;
    top: -60px;
    left: -130px;
    background: radial-gradient(#0b6c36, #3fc07f);
    overflow: hidden;
}

#radius-shape-2 {
    border-radius: 38% 62% 63% 37% / 70% 33% 67% 30%;
    bottom: -60px;
    right: -110px;
    width: 300px;
    height: 300px;
    background: radial-gradient(#0b6c36, #3fc07f);
    overflow: hidden;
}

.bg-glass {
    background-color: hsla(120, 20%, 95%, 0.9) !important; /* soft greenish glass */
    backdrop-filter: saturate(200%) blur(25px);
}

.form-control {
    border: none;
    padding: 12px 20px;
}

.form-control:focus {
    box-shadow: none;
    border-color: #0b6c36;
}

.btn-login {
    background-color: #0b6c36;
    color: white;
    border-radius: 20px;
    padding: 10px 20px;
    border: none;
}

.btn-login:hover {
    background-color: #094f27;
    color: white;
}

.signup-link {
    color: #0b6c36;
    text-decoration: none;
    font-weight: bold;
}

    </style>
</head>

<body>
    <section class="background-radial-gradient overflow-hidden" style="height: 100vh;">
        <div class="container px-4 py-5 px-md-5 text-center text-lg-start my-5">
            <div class="row gx-lg-5 align-items-center mb-5">
                <div class="col-lg-6 mb-5 mb-lg-0" style="z-index: 10">
                    <h1 class="my-5 display-5 fw-bold ls-tight" style="color: hsl(218, 81%, 95%)">
                        Streamline your business<br />
                        <span style=" color: hsl(145, 70%, 65%);">with our all-in-one ERP</span>
                    </h1>
                    <p class="mb-4 opacity-70" style="color: hsl(218, 81%, 85%)">
                        Manage finance, sales, inventory, HR, and operations effortlessly in one place.
                    </p>

                </div>

                <div class="col-lg-6 mb-5 mb-lg-0 position-relative">
                    <div id="radius-shape-1" class="position-absolute rounded-circle shadow"></div>
                    <div id="radius-shape-2" class="position-absolute shadow"></div>

                    <div class="card bg-glass">
                        <div class="card-body px-4 py-5 px-md-5">
                            <h2 class="text-center">Welcome</h2>
                            <p class="text-muted text-center">Login in to your account to continue</p>
                            <form>
                                <div class="mb-3">
                                    <input type="email" class="form-control" placeholder="Email" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" autocomplete="current-password" class="form-control"
                                        placeholder="Password" required>
                                </div>
                                <div class="mb-3 text-end">
                                    <a href="#" class="text-muted text-decoration-none small">Forgot your password?</a>
                                </div>
                                <div class="mb-3">
                                    <button type="submit" class="btn btn-login w-100">LOG IN</button>
                                </div>
                                <div class="text-center">
                                    <span class="text-muted">Don't have an account? <a href="#" class="signup-link">Sign
                                            Up</a></span>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
