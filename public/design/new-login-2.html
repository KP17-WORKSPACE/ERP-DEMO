<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venus - Lead List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="./assets/css/_main.css" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-wrap: wrap;
        }

        .left-panel {
            background: linear-gradient(135deg, #0b6c36, #107a42);
            color: white;
            padding: 40px;
            flex: 1;
            min-width: 300px;
        }

        .left-panel .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .flame-icon {
            background: white;
            color: #4a7c59;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .right-panel {
            padding: 40px;
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-control {
            border-radius: 20px;
            background-color: #eaf5ed;
            border: none;
            padding: 12px 20px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #0b6c36;
        }

        .btn-login {
            background-color: #0b6c36;
            color: white;
            border-radius: 20px;
            padding: 10px 20px;
            border: none;
        }

        .btn-login:hover {
            background-color: #0a5c30;
            color: white;
        }

        .signup-link {
            color: #0b6c36;
            text-decoration: none;
            font-weight: bold;
        }

        .login-footer {
            background-color: #f0f0f0;

            color: linear-gradient(135deg, #0b6c36, #107a42);
            /* border-top: 1px solid #343a40; */
            width: 100%;
        }

        .login-footer small {
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <div class="login-container">
            <div class="left-panel d-flex flex-column justify-content-center">
                <div class="logo text-center">
                    <div class="flame-icon mb-2">
                        <i class="ico icon-bold-flame" style="font-size: 4rem;"></i>
                    </div>
                    <div class="logo-text">
                        Venus ERP
                    </div>
                </div>
                <h2 class="text-center">Join Us Today!</h2>
                <p class="text-center">Sign up to access all features and enjoy a personalized experience.</p>
                <button class="btn btn-outline-light mt-3 rounded-pill">SIGN UP</button>
            </div>
            <div class="right-panel">
                <h2 class="text-center">Welcome</h2>
                <p class="text-muted text-center">Login in to your account to continue</p>
                <form>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" autocomplete="current-password" class="form-control"
                            placeholder="Password" required>
                    </div>
                    <div class="mb-3 text-end">
                        <a href="#" class="text-muted text-decoration-none small">Forgot your password?</a>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-login w-100">LOG IN</button>
                    </div>
                    <div class="text-center">
                        <span class="text-muted">Don't have an account? <a href="#" class="signup-link">Sign
                                Up</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="login-footer py-3 px-4">
        <div class="row align-items-center">
            <div class="col-md-8 text-center text-md-start mb-2 mb-md-0">
                <!-- <small>© 2025 Venus, All Rights Reserved</small> -->
            </div>
            <div class="col-md-4 d-flex justify-content-center justify-content-md-end">
                <div class="powered-by d-flex align-items-center gap-2">
                    <span class="small">Powered By</span>
                    <img src="https://www.sysllc.com/wp-content/uploads/2018/12/web-main-1.png" alt="Powered by"
                        style="height: 24px;">
                </div>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="./assets/js/_main.js" type="text/javascript"></script>
    <script src="./assets/js/lead-list.js" type="text/javascript"></script>
</body>

</html>
