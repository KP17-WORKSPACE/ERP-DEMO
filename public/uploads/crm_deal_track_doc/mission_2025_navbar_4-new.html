<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission 2025 - भावी नगरसेवक</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        
        .navbar-custom {
            background: white;
            padding: 15px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 0 20px;
            flex-wrap: wrap;
        }
        
        /* Left Section - Brand */
        .brand-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .metro-lines {
            display: flex;
            gap: 2px;
        }
        
        .metro-line {
            width: 4px;
            height: 45px;
            border-radius: 2px;
        }
        
        .line-red { background: #e31e24; }
        .line-purple { background: #8b3a9c; }
        .line-green { background: #00a651; }
        .line-blue { background: #0066b3; }
        
        .brand-text h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.1;
            background: linear-gradient(135deg, #e31e24 0%, #8b3a9c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Center Section - Mission */
        .mission-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .mission-badge {
            background: linear-gradient(135deg, #8b3a9c 0%, #0066b3 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 10px rgba(139, 58, 156, 0.3);
            white-space: nowrap;
        }
        
        .prabhag-box {
            background: linear-gradient(135deg, #e31e24 0%, #c41e3a 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 3px 10px rgba(227, 30, 36, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .prabhag-number {
            background: white;
            color: #e31e24;
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 900;
        }
        
        .goal-text {
            color: #0066b3;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.3;
            text-align: center;
        }
        
        /* Right Section - Candidate */
        .candidate-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .profile-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #e3e3e3 0%, #f5f5f5 100%);
            flex-shrink: 0;
        }
        
        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .candidate-name-box {
            background: linear-gradient(135deg, #e31e24 0%, #c41e3a 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 700;
            box-shadow: 0 3px 12px rgba(227, 30, 36, 0.3);
            white-space: nowrap;
        }
        
        /* Responsive Design */
        @media (max-width: 992px) {
            .navbar-container {
                justify-content: center;
            }
            
            .mission-section {
                order: 3;
                width: 100%;
                justify-content: center;
            }
            
            .goal-text {
                width: 100%;
            }
        }
        
        @media (max-width: 768px) {
            .navbar-custom {
                padding: 12px 0;
            }
            
            .navbar-container {
                padding: 0 15px;
                gap: 15px;
            }
            
            .metro-line {
                height: 35px;
                width: 3px;
            }
            
            .brand-text h1 {
                font-size: 1.3rem;
            }
            
            .mission-badge {
                font-size: 0.85rem;
                padding: 6px 14px;
            }
            
            .prabhag-box {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
            
            .prabhag-number {
                font-size: 0.95rem;
                padding: 2px 10px;
            }
            
            .goal-text {
                font-size: 0.85rem;
            }
            
            .profile-circle {
                width: 50px;
                height: 50px;
                border: 2px solid white;
            }
            
            .candidate-name-box {
                font-size: 0.95rem;
                padding: 6px 16px;
            }
        }
        
        @media (max-width: 576px) {
            .brand-text h1 {
                font-size: 1.1rem;
            }
            
            .metro-line {
                height: 30px;
            }
            
            .mission-badge,
            .prabhag-box {
                font-size: 0.75rem;
                padding: 5px 10px;
            }
            
            .prabhag-number {
                font-size: 0.85rem;
                padding: 2px 8px;
            }
            
            .goal-text {
                font-size: 0.8rem;
            }
            
            .profile-circle {
                width: 45px;
                height: 45px;
            }
            
            .candidate-name-box {
                font-size: 0.85rem;
                padding: 5px 12px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <div class="navbar-container">
                
                <!-- Left: Brand Section -->
                <div class="brand-section">
                    <div class="metro-lines">
                        <div class="metro-line line-red"></div>
                        <div class="metro-line line-purple"></div>
                        <div class="metro-line line-green"></div>
                        <div class="metro-line line-blue"></div>
                    </div>
                    <div class="brand-text">
                        <h1>भावी<br>नगरसेवक</h1>
                    </div>
                </div>
                
                <!-- Center: Mission Section -->
                <div class="mission-section">
                    <div class="mission-badge">
                        <span>MISSION 2025</span>
                    </div>
                    
                    <div class="prabhag-box">
                        <span>प्रभाग क्रमांक</span>
                        <span class="prabhag-number">02</span>
                    </div>
                    
                    <div class="goal-text">
                        जनतेचा विश्वास विकासाचा ध्येय...!
                    </div>
                </div>
                
                <!-- Right: Candidate Section -->
                <div class="candidate-section">
                    <div class="profile-circle">
                        <img src="https://via.placeholder.com/60x60/e3e3e3/666666?text=Photo" alt="Kailas Kanchansingh Thakur">
                    </div>
                    
                    <div class="candidate-name-box">
                        कैलास कंचनसिंग ठाकूर
                    </div>
                </div>
                
            </div>
        </div>
    </nav>
    
    <!-- Demo Content -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <div class="text-center p-4">
                    <h2 class="mb-3">जनतेच्या सेवेसाठी तत्पर</h2>
                    <p class="lead">विकासाच्या वाटेवर एकत्र चला</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
